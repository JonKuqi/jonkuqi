name: Update GitHub Stats

on:
  schedule:
    # Update every day at 03:00 UTC
    - cron: "0 3 * * *"

  # Allows you to run it manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate GitHub stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_title=true&hide_border=true&theme=transparent&include_all_commits=true&hide=stars,contribs&rank_icon=github&number_format=long"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate language stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_title=true&hide_border=true&theme=transparent&langs_count=6&hide=Jupyter%20Notebook&size_weight=0.5&count_weight=0.5"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg
          git commit -m "Update GitHub stats" || exit 0
          git push